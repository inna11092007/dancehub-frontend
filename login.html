<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceHub - Вхід</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .submit-btn { width: 100%; padding: 12px; background-color: #e91e63; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .submit-btn:hover { background-color: #c2185b; }
        #message { text-align: center; margin-top: 15px; font-weight: bold; }
        .register-link { text-align: center; margin-top: 20px; display: block; color: #666; text-decoration: none; font-size: 14px; }
        .register-link span { color: #e91e63; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Вхід у DanceHub 🕺</h2>
        
        <div class="form-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Пароль" required>
        </div>
        
        <button class="submit-btn" onclick="loginUser()">Увійти</button>
        
        <p id="message"></p>

        <a href="register.html" class="register-link">Ще немає акаунта? <span>Зареєструватись</span></a>
    </div>

    <script>
        async function loginUser() {
            const loginData = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const messageElement = document.getElementById('message');

            try {
                // Відправляємо дані на бекенд для ПЕРЕВІРКИ
                const response = await fetch("https://dancehub-api.onrender.com/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();

                if (response.ok) {
    messageElement.style.color = "green";
    messageElement.innerText = result.message; 
    
    // ПЕРЕД ЗАПИСОМ НОВИХ ДАНИХ ОЧИЩАЄМО ВСЕ СТАРЕ
    localStorage.clear();

    // ЗБЕРІГАЄМО НОВІ СПРАВЖНІ ДАНІ З БЕКЕНДУ
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("user_id", result.id); 
    localStorage.setItem("user_name", result.name || "Користувач"); // ТЕПЕР З ПІДКРЕСЛЕННЯМ!
    localStorage.setItem("name", result.name || "Користувач");      // ДУБЛЮЄМО ПРО ВСЯК ВИПАДОК
    localStorage.setItem("userRole", result.role || "dancer");

    // Розумний редирект: якщо адмін — в адмінку, інакше — в кабінет
    setTimeout(() => {
        if (result.role === "admin") {
            window.location.href = "admin.html";
        } else {
            window.location.href = "cabinet.html";
        }
    }, 1500);

} else {
                    // ... (тут залишається те, що й було: обробка помилок)
                    messageElement.style.color = "red";
                    messageElement.innerText = "Помилка: " + result.detail;
                }
            } catch (error) {
                messageElement.style.color = "red";
                messageElement.innerText = "Сервер не відповідає. Перевір бекенд!";
            }
        }
    </script>
</body>
</html>
